<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css.css">
</head>
<body>

    <div class="app-container">

        <!-- Main GPA Calculator -->
        <div id="mainBox" class="container-box">

            <div class="header text-center mb-4">
                <i class="bi bi-mortarboard-fill display-3"></i>
                <h2 class="fw-bold mt-3">GPA Calculator</h2>
                <p class="opacity-75">
                    Calculate your semester GPA quickly and easily.
                </p>
            </div>

            <div class="mb-4">
                <label for="subjectSelect" class="form-label">
                    <i class="bi bi-book"></i>
                    Select Subject
                </label>

                <select id="subjectSelect" class="form-select">
                    <option value="" disabled selected hidden>
                        Choose Subject
                    </option>
                </select>
            </div>

            <button class="btn btn-secondary w-100 mb-3" onclick="addSubject()">
                <i class="bi bi-plus-circle"></i>
                Add Subject
            </button>

            <button class="btn btn-outline-primary w-100 mb-4" onclick="showCumulativeBox()">
                <i class="bi bi-graph-up-arrow"></i>
                Calculate Cumulative GPA
            </button>

            <ul id="subjectList" class="list-group mb-4"></ul>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <span class="fw-bold">
                    <i class="bi bi-clock-history"></i>
                    Total Credit Hours
                </span>

                <span class="badge bg-primary fs-6" id="totalHours">
                    0
                </span>
            </div>

            <button class="btn-modern btn-modern-secondary w-100" onclick="calculateGPA()">
                <i class="bi bi-calculator"></i>
                Calculate GPA
            </button>

            <div class="result-card text-center mt-4">
                <small>Your GPA</small>
                <h1 id="gpaResult">0.00</h1>
            </div>

        </div>

        <!-- Cumulative GPA -->
        <div id="cumulativeBox" class="container-box hidden">

            <div class="header text-center mb-4">
                <i class="bi bi-bar-chart-fill display-4"></i>
                <h3 class="fw-bold mt-3">Cumulative GPA</h3>
                <p class="opacity-75">
                    Calculate your overall GPA.
                </p>
            </div>

            <div class="row g-3">

                <div class="col-md-6">
                    <input
                        type="number"
                        step="0.01"
                        class="form-control"
                        id="prevGPA"
                        placeholder="Previous GPA">
                </div>

                <div class="col-md-6">
                    <input
                        type="number"
                        class="form-control"
                        id="prevHours"
                        placeholder="Previous Credit Hours">
                </div>

                <div class="col-md-6">
                    <input
                        type="number"
                        step="0.01"
                        class="form-control"
                        id="currentGPA"
                        placeholder="Current GPA">
                </div>

                <div class="col-md-6">
                    <input
                        type="number"
                        class="form-control"
                        id="currentHours"
                        placeholder="Current Credit Hours">
                </div>

            </div>

            <button class="btn btn-success w-100 mt-4" onclick="calculateCumulative()">
                <i class="bi bi-calculator-fill"></i>
                Calculate
            </button>

            <div id="cumulativeResultBox" class="result-card text-center mt-4 hidden">
                <small>Cumulative GPA</small>
                <h1 id="cumulativeResult">0.00</h1>
            </div>

            <button class="btn btn-outline-secondary w-100 mt-4" onclick="backToMain()">
                <i class="bi bi-arrow-left"></i>
                Back
            </button>

        </div>

    </div>

    <footer class="copyright">
        Made with ❤️ by
        <a href="https://www.facebook.com/profile.php?id=100009266123848" target="_blank">
            Adham Mohamed
        </a>
    </footer>

    <script src="js.js"></script>

</body>
</html>
