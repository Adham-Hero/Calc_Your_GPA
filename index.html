<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب GPA</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css.css">
</head>
<body>

<div class="app-container">

    <!-- Main GPA Calculator -->
    <div id="mainBox" class="container-box">

        <div class="header">
            <i class="bi bi-mortarboard-fill"></i>
            <h2>احسب الـ GPA</h2>
            <p>احسب المعدل الفصلي بسهولة ودقة.</p>
        </div>

        <div class="mb-4">
            <label for="subjectSelect" class="form-label">
                <i class="bi bi-book"></i>
                اختر المادة
            </label>

            <select id="subjectSelect" class="form-select">
                <option value="" disabled selected hidden>
                    اختر المادة
                </option>
            </select>
        </div>

        <button class="btn btn-secondary w-100 mb-3" onclick="addSubject()">
            <i class="bi bi-plus-circle"></i>
            إضافة المادة
        </button>

        <button class="btn btn-outline-primary w-100 mb-4" onclick="showCumulativeBox()">
            <i class="bi bi-graph-up-arrow"></i>
            حساب الـ GPA التراكمي
        </button>

        <ul id="subjectList" class="list-group mb-4"></ul>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <span class="fw-bold">
                <i class="bi bi-clock-history"></i>
                إجمالي الساعات
            </span>

            <span class="badge bg-primary fs-6" id="totalHours">
                0
            </span>
        </div>

        <button class="btn-modern btn-modern-secondary w-100" onclick="calculateGPA()">
            <i class="bi bi-calculator"></i>
            احسب الـ GPA
        </button>

        <div class="result-card mt-4">
            <small>المعدل الفصلي</small>
            <h1 id="gpaResult">0.00</h1>
        </div>

    </div>

    <!-- Cumulative GPA -->
    <div id="cumulativeBox" class="container-box hidden">

        <div class="header">
            <i class="bi bi-bar-chart-fill"></i>
            <h2>حساب الـ GPA التراكمي</h2>
            <p>احسب المعدل التراكمي بعد إضافة بياناتك.</p>
        </div>

        <div class="row g-3">

            <div class="col-md-6">
                <input
                    type="number"
                    step="0.01"
                    class="form-control"
                    id="prevGPA"
                    placeholder="الـ GPA السابق">
            </div>

            <div class="col-md-6">
                <input
                    type="number"
                    class="form-control"
                    id="prevHours"
                    placeholder="عدد الساعات السابقة">
            </div>

            <div class="col-md-6">
                <input
                    type="number"
                    step="0.01"
                    class="form-control"
                    id="currentGPA"
                    placeholder="GPA هذا الفصل">
            </div>

            <div class="col-md-6">
                <input
                    type="number"
                    class="form-control"
                    id="currentHours"
                    placeholder="عدد ساعات هذا الفصل">
            </div>

        </div>

        <button class="btn btn-success w-100 mt-4" onclick="calculateCumulative()">
            <i class="bi bi-calculator-fill"></i>
            احسب التراكمي
        </button>

        <div id="cumulativeResultBox" class="result-card mt-4 hidden">
            <small>المعدل التراكمي</small>
            <h1 id="cumulativeResult">0.00</h1>
        </div>

        <button class="btn btn-outline-secondary w-100 mt-4" onclick="backToMain()">
            <i class="bi bi-arrow-right"></i>
            الرجوع للحساب العادي
        </button>

    </div>

</div>

<footer class="copyright">
    Made with ❤️ by
    <a href="https://www.facebook.com/profile.php?id=100009266123848" target="_blank">
        Adham Mohamed
    </a>
</footer>

<script src="js.js"></script>

</body>
</html>
